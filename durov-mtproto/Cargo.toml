[package]
name = "durov-mtproto"
edition = "2024"

[dependencies]
thiserror = "2"
durov-tl-types = { path = "../durov-tl-types" }
durov-crypto = { path = "../durov-crypto" }
crypto-bigint = "0.7.0-rc.10"
crypto-primes = "0.7.0-pre.4"
rand = "0.10.0-rc.5"
rsa = { version = "0.10.0-rc.10", features = ["hazmat"] }
log = "0.4"
flate2 = { version = "1", features = ["zlib-rs"] }

[features]
fast-buf = ["durov-tl-types/fast-buf"]
