[package]
name = "durov-mtclient"
edition = "2024"

[dependencies]
thiserror = "2"
tokio = { version = "1", features = ["io-util", "net", "sync", "time"] }
durov-mtproto = { path = "../durov-mtproto" }
durov-tl-types = { path = "../durov-tl-types" }
rsa = "0.10.0-rc.10"
log = "0.4"

[dev-dependencies]
eyre = "0.6"
tokio = { version = "1", features = ["rt", "macros"] }
env_logger = "0.11"

[features]
fast-buf = ["durov-mtproto/fast-buf"]
